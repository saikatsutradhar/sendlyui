<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Articles - Sendly</title>

    <script>
        const currentArticleUrl = window.location.href.split('?')[0];
        const canonicalTag = document.createElement('link');
        canonicalTag.rel = 'canonical';
        canonicalTag.href = currentArticleUrl;
        document.head.appendChild(canonicalTag);
    </script>

    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --secondary: #F43F5E;
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.65);
        }

        * {
            box-sizing: border-box;
        }

        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            margin: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(168, 85, 247, 0.5);
            border-radius: 8px;
            border: 2px solid transparent;
            background-clip: padding-box;
        }

        ::-webkit-scrollbar-thumb:hover {
            background-color: rgba(168, 85, 247, 0.8);
        }

        html,
        body {
            background-color: #0b1120;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            color: var(--text-main);
        }

        /* --- BACKGROUND --- */
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            filter: brightness(80%);
            pointer-events: none;
        }

        /* --- FIXED HEADER --- */
        .header {
            width: 100%;
            padding: 10px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
            position: fixed;
            top: 0;
            left: 0;
        }

        .header-logo {
            font-size: 24px;
            font-weight: 800;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-links a {
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            margin-left: 30px;
            transition: color 0.3s;
        }

        .header-links a:hover,
        .header-links a.active {
            color: white;
            font-weight: 600;
        }

        /* --- PAGE LAYOUT --- */
        .page-wrapper {
            flex: 1;
            padding: 120px 5% 100px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        /* --- HERO SECTION --- */
        .hero-container {
            text-align: center;
            margin-bottom: 60px;
        }

        .hero-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-size: 48px;
            font-weight: 800;
            margin: 0 0 15px 0;
            letter-spacing: -1px;
        }

        .hero-title img {
            height: 70px;
            width: auto;
        }

        .hero-subtitle {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .loader {
            text-align: center;
            color: white;
            font-weight: 600;
            font-size: 18px;
            margin-top: 50px;
        }

        /* --- ARTICLES GRID --- */
        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px 30px;
        }

        /* --- CLEAN ARTICLE CARDS (MATCHING SCREENSHOT) --- */
        .article-card {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            cursor: pointer;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .article-card:hover {
            transform: translateY(-8px);
            border-color: rgba(168, 85, 247, 0.4);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.4);
        }

        .article-card:hover .article-image {
            transform: scale(1.03);
        }

        .article-card:hover .article-title {
            color: #e879f9;
        }

        /* Image Box */
        .article-image-wrapper {
            width: 100%;
            aspect-ratio: 16 / 10;
            overflow: hidden;
            position: relative;
            background: #111827;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .article-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        /* Content Area */
        .article-content {
            display: flex;
            flex-direction: column;
            padding: 24px;
            flex: 1;
        }

        .article-title {
            font-size: 18px;
            font-weight: 700;
            margin: 0 0 12px 0;
            color: #ffffff;
            line-height: 1.4;
            transition: color 0.3s ease;
        }

        .article-summary {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.6;
            margin: 0 0 15px 0;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .read-link {
            font-size: 13px;
            color: #a855f7;
            font-weight: 600;
            margin-bottom: 20px;
            display: inline-block;
            transition: opacity 0.2s;
        }

        .article-card:hover .read-link {
            opacity: 0.8;
        }

        /* Footer Metadata */
        .article-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }

        .author-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .author-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .author-avatar img {
            width: 14px;
            height: auto;
        }

        .author-name {
            font-size: 13px;
            font-weight: 600;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pro-badge {
            background: rgba(168, 85, 247, 0.2);
            color: #e879f9;
            font-size: 10px;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 4px;
            letter-spacing: 0.5px;
        }

        .article-date {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 500;
        }

        /* --- FOOTER --- */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 5px;
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(12px);
            z-index: 100;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .footer a {
            color: white;
            text-decoration: none;
            font-weight: 600;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 850px) {
            .hero-title {
                font-size: 36px;
            }

            .hero-title img {
                height: 36px;
            }

            .header-links {
                display: none;
            }
        }
    </style>
</head>

<body>
    <img src="background.png" alt="Background" class="bg-image">

    <header class="header">
        <a href="/" class="header-logo">
            <img src="logo.png" alt="Sendly Logo" style="height: 35px; width: auto;">
        </a>
        <div class="header-links">
            <a href="/how-it-works">How it works</a>
            <a href="/screen">Screen Share</a>
            <a href="/notepad">Live Notepad</a>
            <a href="/json-formatter">JSON Formatter</a>
            <a href="/articles" class="active">Articles</a>
        </div>
    </header>

    <div class="page-wrapper">
        <div class="hero-container">
            <h1 class="hero-title">
                <img src="logo.png" alt="Sendly Icon"> Articles
            </h1>
            <p class="hero-subtitle">The latest news in cybersecurity, data privacy, and safe file sharing, curated
                daily by AI.</p>
        </div>

        <div id="loader" class="loader">Fetching latest articles...</div>

        <div class="articles-grid" id="articlesGrid">
        </div>
    </div>

    <footer class="footer">
        © 2026 <img src="logo.png" alt="Sendly"
            style="height: 18px; vertical-align: middle; margin: 0 4px; position: relative; top: -1px;"> Secure File
        Transfer. <a href="/terms-privacy">Terms</a> & <a href="/terms-privacy">Privacy</a>.
        &nbsp;&nbsp;&nbsp;<a href="https://github.com/saikatsutradhar" target="_blank"
            style="color: inherit; text-decoration: none; opacity: 0.8; transition: opacity 0.2s;"
            onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.8" title="GitHub Profile"><svg
                viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"
                stroke-linecap="round" stroke-linejoin="round" style="vertical-align: text-bottom; margin-right: 4px;">
                <path
                    d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22">
                </path>
            </svg></a>&nbsp;&nbsp;&nbsp;<a href="mailto:5ynt4x.3rr0r.ss@gmail.com"
            style="color: inherit; text-decoration: none; opacity: 0.8; transition: opacity 0.2s;"
            onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.8" title="Email Us"><svg
                viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"
                stroke-linecap="round" stroke-linejoin="round" style="vertical-align: text-bottom; margin-right: 4px;">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>

    <script>
        // 2. AUTOMATED INTERNAL LINKING FUNCTION (SEO GOLD)
        function autoInternalLink(text) {
            if (!text) return "";
            const linkMap = {
                "JSON": "<a href='/json-formatter' style='color:#a855f7; text-decoration:underline;'>JSON</a>",
                "file transfer": "<a href='/' style='color:#22d3ee; text-decoration:underline;'>file transfer</a>",
                "screen sharing": "<a href='/screen' style='color:#F43F5E; text-decoration:underline;'>screen sharing</a>",
                "notepad": "<a href='/notepad' style='color:#10B981; text-decoration:underline;'>notepad</a>",
                "AES-256": "<a href='/how-it-works' style='color:#4F46E5; text-decoration:underline;'>AES-256</a>"
            };
            let linkedText = text;
            for (const [keyword, htmlLink] of Object.entries(linkMap)) {
                const regex = new RegExp(`\\b${keyword}\\b`, 'gi');
                linkedText = linkedText.replace(regex, htmlLink);
            }
            return linkedText;
        }

        // Fetch real data from your backend
        fetch("https://sendlyapi.onrender.com/api/blogs")
            .then(res => res.json())
            .then(data => {
                document.getElementById("loader").style.display = 'none';
                const grid = document.getElementById("articlesGrid");

                if (data.length === 0) {
                    grid.innerHTML = "<p style='color:rgba(255,255,255,0.7); text-align:center; width:100%;'>The AI is currently writing our first post. Check back soon!</p>";
                    return;
                }

                data.forEach(blog => {
                    // Clean summary creation
                    let rawText = blog.summary || blog.content || "Click to read the full article and learn more about this topic.";
                    let plainText = rawText.replace(/<[^>]+>/g, '');
                    let shortSummary = plainText.length > 130 ? plainText.substring(0, 130) + "..." : plainText;

                    // Apply internal SEO links dynamically
                    let seoOptimizedSummary = autoInternalLink(shortSummary);

                    grid.innerHTML += `
                        <a href="${blog.source_url}" target="_blank" class="article-card">
                            <div class="article-image-wrapper">
                                <img src="${blog.image_url}" alt="Article Image" class="article-image" onerror="this.src='https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=800&q=80'">
                            </div>
                            <div class="article-content">
                                <h2 class="article-title">${blog.title}</h2>
                                <p class="article-summary">${seoOptimizedSummary}</p>
                                <span class="read-link">Read full article &rarr;</span>
                                
                                <div class="article-meta">
                                    <div class="author-info">
                                        <div class="author-avatar"><img src="logo.png" alt="S"></div>
                                        <span class="author-name">Sendly AI <span class="pro-badge">PRO+</span></span>
                                    </div>
                                    <span class="article-date">${blog.date}</span>
                                </div>
                            </div>
                        </a>
                    `;
                });
            })
            .catch(err => {
                document.getElementById("loader").innerText = "Failed to load articles. Server might be spinning up.";
            });
    </script>
</body>

</html>
