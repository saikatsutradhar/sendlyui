    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JSON Cracker — Sendly</title>
    <link rel="preload" href="background1.webp" as="image">

    <meta name="description" content="Visualize your JSON data instantly as interactive graphs using JSON Crack.">

    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
        rel="stylesheet" media="print" onload="this.media='all'">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">

    <style>
        h1, h2, h3, .logo-text, .header-logo, .hero-title, .page-title, .panel-title {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
        }

        :root {
            --primary: #4F46E5;
            --secondary: #E11D48;
            --text-main: #1F2937;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            color: var(--text-main);
        }

        .bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            filter: brightness(80%);
            pointer-events: none;
        }

        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            margin: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(168, 85, 247, 0.5);
            border-radius: 8px;
            border: 2px solid transparent;
            background-clip: padding-box;
        }

        ::-webkit-scrollbar-thumb:hover {
            background-color: rgba(168, 85, 247, 0.8);
        }

        .header {
            width: 100%;
            padding: 5px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);

            font-weight: 800;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;

        .header-links {
            display: flex;

        }

        .header-links a {
            color: rgba(255, 255, 255, 0.85);

            font-size: 15px;

            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .CodeMirror {
            flex: 1;
            height: auto;
            background: transparent !important;
            font-family: monospace;
            font-size: 14px;
            padding: 10px 0;
        }

        .CodeMirror-gutters {
            background: #1e1e1e !important;
            border-right: 1px solid #333 !important;
        }

        .CodeMirror-selected {
            background-color: rgba(79, 70, 229, 0.4) !important; /* var(--primary) with opacity */
        }
        
        .CodeMirror-focused .CodeMirror-selected {
            background-color: rgba(79, 70, 229, 0.4) !important;
        }

        .btn-visualize {
            background: linear-gradient(135deg, var(--primary), #a855f7);
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 12px;

            font-weight: 600;
            transition: all 0.2s;

        .btn-visualize:hover {

        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 5px;
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(12px);
            z-index: 100;
            border-top: 1px solid rgba(255, 255, 255, 0.1);

        .footer a {
            color: inherit;
            text-decoration: none;

        .jc-toolbar {
            position: absolute;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            background: #232323;
            border-radius: 999px;
            display: flex;
            align-items: center;
            padding: 8px 16px;
            gap: 8px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .jc-toolbar-btn {
            background: transparent;
            border: none;
            color: #D4D4D4;
            width: 34px;
            height: 34px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.15s ease;
            padding: 0;
        }
        
        .jc-toolbar-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #FFFFFF;
        }
        
        .jc-toolbar-btn svg {
            width: 20px;
            height: 20px;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        
        .jc-divider {
            width: 1px;
            height: 20px;
            background: rgba(255, 255, 255, 0.15);
            margin: 0 4px;

        .network-container-dark {
            background-color: #0f172a;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 25px 25px;
        }
        
        .network-container-light {
            background-color: #f8fafc;
            background-image:
                linear-gradient(rgba(0, 0, 0, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.05) 1px, transparent 1px);
            background-size: 25px 25px;
        }

        @media (max-width: 1024px) {
            .split-layout {
                flex-direction: column;
                height: auto;
            }
            .panel {
                min-height: 400px;
            }
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/standalone/umd/vis-network.min.js"></script>

<body>
    <picture id="vanta-bg" class="bg-video">

        <img src="background1.webp" alt="Background" fetchpriority="high" style="width: 100vw; height: 100vh; object-fit: cover;">
    </picture>

    <header class="header">
        <a href="/" class="header-logo"><img src="logo.webp" alt="Sendly Logo"  width="102" height="40"></a>
        <div class="header-links">
            <a href="/">Home</a>
            <a href="/how-it-works">How it works</a>

            <a href="/notepad">Live Notepad</a>

    <div class="page-wrapper">
        <h1 class="hero-title">
            <img src="logo.webp" alt="Sendly Icon"  width="178" height="70">JSON Cracker
        </h1>
        <p class="page-subtitle">Visualize your JSON data instantly as interactive graphs.</p>

        <div class="split-layout">
            <div class="panel">
                <div class="panel-header">
                    <span>Input JSON</span>
                    <button class="btn-visualize" onclick="updateWidget()">Visualize</button>
                </div>
                <textarea id="inputEditor">{"hello": "world", "status": "active"}</textarea>
            </div>

            <div class="panel" style="padding: 0; position: relative;" id="rightPanel">
                <div id="networkContainer" class="network-container-dark" style="width: 100%; height: 100%; min-height: 400px; border-radius: 24px;"></div>
                <div class="jc-toolbar">
                    <button class="jc-toolbar-btn" onclick="jcAction('CENTER')" title="Center">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 7H7v2M15 7h2v2M9 17H7v-2M15 17h2v-2"/></svg>
                    </button>
                    <button class="jc-toolbar-btn" onclick="jcFullscreen()" title="Fullscreen">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M8 4H4v4M16 4h4v4M8 20H4v-4M16 20h4v-4"/></svg>
                    </button>
                    <button class="jc-toolbar-btn" onclick="jcAction('ZOOM_OUT')" title="Zoom Out">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 12h12"/></svg>
                    </button>
                    <button class="jc-toolbar-btn" onclick="jcAction('ZOOM_IN')" title="Zoom In">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 6v12M6 12h12"/></svg>
                    </button>
                    <div class="jc-divider"></div>
                    <button class="jc-toolbar-btn" onclick="jcToggleDirection()" title="Layout Direction">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M8 20V4M4 8l4-4 4 4M16 4v16M12 16l4 4 4-4"/></svg>
                    </button>
                    <div class="jc-divider"></div>
                    <button class="jc-toolbar-btn" onclick="jcToggleTheme()" title="Settings / Theme">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    </button>
                </div>
                <div id="jcToast" style="position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: white; padding: 10px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; opacity: 0; transition: opacity 0.3s; z-index: 1000; pointer-events: none; border: 1px solid rgba(255,255,255,0.1); white-space: nowrap;"></div>
            </div>
        </div>
    </div>

    <footer class="footer">
        © 2026 <img src="logo.webp" alt="Sendly"  width="56" height="22"> <span>Secure File Transfer.</span> <a href="/terms-privacy">Terms</a> & <a href="/terms-privacy">Privacy</a>.
    </footer>

    <script>
        const inputEditor = CodeMirror.fromTextArea(document.getElementById("inputEditor"), {
            mode: "application/json",
            theme: "material-darker",
            lineNumbers: true,
            matchBrackets: true,
            lineWrapping: true
        });

        const networkContainer = document.getElementById("networkContainer");
        let network = null;
        let currentTheme = "dark";
        const directions = ["LR", "UD", "RL", "DU"]; // Left-Right, Up-Down, Right-Left, Down-Up
        let currentDirIndex = 0;
        let toastTimeout;

        function showToast(message) {
            const toast = document.getElementById('jcToast');
            toast.innerText = message;
            toast.style.opacity = 1;
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => { toast.style.opacity = 0; }, 3000);
        }

        function buildGraphData(jsonObj) {
            const nodes = [];
            const edges = [];
            let idCounter = 1;
            const MAX_TOTAL_NODES = 1000;
            const MAX_CHILDREN = 50;

            function traverse(key, value, parentId = null, edgeLabel = '') {
                if (nodes.length >= MAX_TOTAL_NODES) return;
                
                let currentId = idCounter++;

                if (Array.isArray(value)) {
                    // ARRAY NODE
                    let label = `<b>${key}</b>\n<i>[ ${value.length} items ]</i>`;
                    nodes.push({ id: currentId, label: label });
                    if (parentId) edges.push({ from: parentId, to: currentId, label: edgeLabel });

                    let children = value;
                    let truncated = false;
                    if (children.length > MAX_CHILDREN) {
                        children = children.slice(0, MAX_CHILDREN);
                        truncated = true;
                    }

                    children.forEach((item, index) => {
                        traverse(`Item ${index}`, item, currentId, `[${index}]`);
                    });

                    if (truncated && nodes.length < MAX_TOTAL_NODES) {
                        const moreId = idCounter++;
                        nodes.push({ id: moreId, label: `<i>... (${value.length - MAX_CHILDREN} more omitted)</i>` });
                        edges.push({ from: currentId, to: moreId, dashes: true });
                    }

                } else if (value !== null && typeof value === 'object') {
                    // OBJECT NODE
                    let primitives = [];
                    let complexKeys = [];

                    for (let k in value) {
                        if (value[k] === null || typeof value[k] !== 'object') {
                            let formattedValue = typeof value[k] === 'string' ? `"${value[k]}"` : value[k];
                            // Truncate long strings
                            if (typeof formattedValue === 'string' && formattedValue.length > 50) {
                                formattedValue = formattedValue.substring(0, 50) + '..."';
                            }
                            primitives.push(`<b>${k}:</b> ${formattedValue}`);
                        } else {
                            complexKeys.push(k);
                        }
                    }

                    let labelLines = [];
                    
                    if (key !== 'Root' && !key.startsWith('Item ')) {
                        labelLines.push(`<b>${key}</b>`);
                        if (primitives.length > 0 || complexKeys.length > 0) labelLines.push("─────────────");
                    }
                    
                    if (primitives.length > 0) labelLines.push(primitives.join('\n'));
                    
                    if (complexKeys.length > 0) {
                        if (primitives.length > 0) labelLines.push("");
                        labelLines.push(`<i>{ ${complexKeys.length} nested objects }</i>`);
                    }

                    let finalLabel = labelLines.join('\n');
                    if(finalLabel === '') finalLabel = "{ }";

                    nodes.push({ id: currentId, label: finalLabel });
                    if (parentId) edges.push({ from: parentId, to: currentId, label: edgeLabel });

                    let truncated = false;
                    if (complexKeys.length > MAX_CHILDREN) {
                        complexKeys = complexKeys.slice(0, MAX_CHILDREN);
                        truncated = true;
                    }

                    complexKeys.forEach(k => {
                        traverse(k, value[k], currentId, k);
                    });

                    if (truncated && nodes.length < MAX_TOTAL_NODES) {
                        const moreId = idCounter++;
                        nodes.push({ id: moreId, label: `<i>... (${Object.keys(value).length - primitives.length - MAX_CHILDREN} more omitted)</i>` });
                        edges.push({ from: currentId, to: moreId, dashes: true });
                    }

                } else {
                    // FALLBACK: Root primitive
                    let displayValue = typeof value === 'string' ? `"${value}"` : value;
                    if (typeof displayValue === 'string' && displayValue.length > 50) {
                        displayValue = displayValue.substring(0, 50) + '..."';
                    }
                    nodes.push({ id: currentId, label: `<b>${key}:</b> ${displayValue}` });
                    if (parentId) edges.push({ from: parentId, to: currentId, label: edgeLabel });
                }
            }

            traverse('Root', jsonObj);
            return { nodes, edges };
        }

        function updateWidget() {
            try {
                const jsonValue = inputEditor.getValue();
                if (!jsonValue.trim()) return;
                const parsedJson = JSON.parse(jsonValue);
                
                showToast("Rendering graph...");

                setTimeout(() => {
                    const graphData = buildGraphData(parsedJson);

                    const options = {
                        layout: {
                            hierarchical: {
                                direction: directions[currentDirIndex],
                                sortMethod: 'directed',
                                nodeSpacing: 120,
                                levelSeparation: 300,
                                treeSpacing: 200,
                                blockShifting: true,
                                edgeMinimization: true,
                                parentCentralization: true
                            }
                        },
                        physics: false,
                        interaction: {
                            dragNodes: true,
                            dragView: true,
                            zoomView: true,
                            hideEdgesOnDrag: true
                        },
                        edges: {
                            smooth: { type: 'cubicBezier', forceDirection: (directions[currentDirIndex] === 'UD' || directions[currentDirIndex] === 'DU') ? 'vertical' : 'horizontal', roundness: 0.5 },
                            color: { color: currentTheme === 'light' ? '#CBD5E1' : '#475569', highlight: '#818cf8' },
                            width: 2,
                            font: { size: 12, color: currentTheme === 'light' ? '#64748b' : '#9ca3af', align: 'horizontal', background: currentTheme === 'light' ? '#f8fafc' : '#0f172a', strokeWidth: 0 }
                        },
                        nodes: {
                            shape: 'box',
                            borderWidth: 1,
                            margin: { top: 12, bottom: 12, left: 16, right: 16 },
                            color: {
                                border: currentTheme === 'light' ? '#e2e8f0' : '#334155',
                                background: currentTheme === 'light' ? '#ffffff' : '#1e1e1e',
                                highlight: { border: '#4F46E5', background: currentTheme === 'light' ? '#f8fafc' : '#2d2d30' }
                            },
                            font: {
                                face: 'monospace',
                                size: 13,
                                color: currentTheme === 'light' ? '#334155' : '#d4d4d4',
                                multi: 'html',
                                align: 'left',
                                bold: { color: currentTheme === 'light' ? '#2563eb' : '#569cd6', face: 'monospace' },
                                italic: { color: currentTheme === 'light' ? '#ea580c' : '#ce9178', face: 'monospace' }
                            },
                            shadow: true
                        }
                    };

                    if (network) {
                        network.setData(graphData);
                        network.setOptions(options);
                    } else {
                        network = new vis.Network(networkContainer, graphData, options);
                    }
                }, 100);

            } catch (e) {
                console.warn("Error rendering graph: " + e.message);
                showToast("Error: Invalid JSON or data too complex.");
            }
        }

        function jcAction(action) {
            if (!network) return;
            if (action === 'ZOOM_IN') {
                const scale = network.getScale() * 1.5;
                network.moveTo({ scale: scale });
            } else if (action === 'ZOOM_OUT') {
                const scale = network.getScale() / 1.5;
                network.moveTo({ scale: scale });
            } else if (action === 'CENTER') {
                network.fit({ animation: { duration: 500, easingFunction: 'easeInOutQuad' } });
            } else if (action === 'DOWNLOAD') {
                showToast("Download is not supported in the web view. Please take a screenshot.");
            } else if (action === 'SEARCH') {
                showToast("Search is not supported in the graph yet. Use the JSON editor.");
            } else if (action === 'EXPAND_COLLAPSE') {
                showToast("Expand/Collapse is currently unsupported in this custom visualizer.");
            }
        }
        
        function jcFullscreen() {
            const panel = document.getElementById('rightPanel');
            if (!document.fullscreenElement) {
                panel.requestFullscreen().catch(err => {
                    console.warn(`Error attempting to enable fullscreen mode: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        function jcToggleDirection() {
            currentDirIndex = (currentDirIndex + 1) % directions.length;
            updateWidget();
        }

        function jcToggleTheme() {
            currentTheme = currentTheme === "light" ? "dark" : "light";
            if (currentTheme === 'light') {
                networkContainer.classList.remove('network-container-dark');
                networkContainer.classList.add('network-container-light');
            } else {
                networkContainer.classList.remove('network-container-light');
                networkContainer.classList.add('network-container-dark');
            }
            updateWidget();
        }

        let typingTimer;
        inputEditor.on('change', () => {
            clearTimeout(typingTimer);
            typingTimer = setTimeout(updateWidget, 1000);
        });

        setTimeout(updateWidget, 500);
    </script>
</body>
